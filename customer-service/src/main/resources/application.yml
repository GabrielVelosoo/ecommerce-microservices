spring:
  application:
    name: Customer Service
  datasource:
    url: jdbc:postgresql://${DATASOURCE_URL}
    username: ${DATASOURCE_USER}
    password: ${DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    show-sql: true
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI}
          audiences: customer-service
  rabbitmq:
    host: ${RABBITMQ_HOST}
    port: 5672
    username: rabbit
    password: rabbit
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

keycloak:
  auth-server-url: ${KEYCLOAK_AUTH_SERVER_URL}
  realm: ecommerce
  client-id: customer-service
  client-secret: ${CLIENT_SECRET}

logging:
  level:
    org.springframework.security: DEBUG

server:
  port: 8081
